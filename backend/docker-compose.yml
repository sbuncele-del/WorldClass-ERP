version: '3.8'

services:
  erp-backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: erp-backend-production
    restart: unless-stopped
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # All environment variables are baked into the Docker image
    # No external config can break this deployment