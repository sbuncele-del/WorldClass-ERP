<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Waitlist Signup</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; line-height: 1.6; color: #333; background: #f5f5f5; padding: 20px; margin: 0;">
  <div style="max-width: 560px; margin: 0 auto; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06);">
    <div style="background: #0A1F3E; padding: 20px 24px; color: #fff;">
      <h2 style="margin: 0; font-size: 18px;">🎯 New Founding Member Signup</h2>
    </div>
    <div style="padding: 24px;">
      <table style="width: 100%; border-collapse: collapse;">
        <tr><td style="padding: 8px 0; font-weight: 600; width: 100px; color: #666;">Name</td><td style="padding: 8px 0;">{{name}}</td></tr>
        <tr><td style="padding: 8px 0; font-weight: 600; color: #666;">Email</td><td style="padding: 8px 0;"><a href="mailto:{{email}}">{{email}}</a></td></tr>
        <tr><td style="padding: 8px 0; font-weight: 600; color: #666;">Company</td><td style="padding: 8px 0;">{{company}}</td></tr>
        <tr><td style="padding: 8px 0; font-weight: 600; color: #666;">Role</td><td style="padding: 8px 0;">{{role}}</td></tr>
        <tr><td style="padding: 8px 0; font-weight: 600; color: #666;">Source</td><td style="padding: 8px 0;">{{source}}</td></tr>
      </table>
      <hr style="border: none; border-top: 1px solid #eee; margin: 16px 0;">
      <p style="color: #888; font-size: 13px;">Follow up within 24 hours. Reply directly to start the conversation.</p>
    </div>
  </div>
</body>
</html>
