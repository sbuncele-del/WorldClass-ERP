name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          echo "Triggering deploy webhook..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            --max-time 30 \
            https://siyabusaerp.co.za/webhook/deploy)
          echo "Response: $RESPONSE"
          if [ "$RESPONSE" = "202" ]; then
            echo "Deploy triggered successfully (running on server)"
          else
            echo "Unexpected response: $RESPONSE — falling back to SSH"
            exit 1
          fi

      - name: Wait and verify deployment
        run: |
          echo "Waiting 3 minutes for build + restart..."
          sleep 180
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://siyabusaerp.co.za/api/health)
          echo "Health check: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Deployment verified — server is healthy"
          else
            echo "WARNING: Health check returned $STATUS"
            exit 1
          fi
