name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 46.101.244.145
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: RESEND_API_KEY
          script: |
            cd /opt/worldclass-erp
            git pull origin main
            # Inject secrets into .env.production
            if [ -n "$RESEND_API_KEY" ]; then
              sed -i '/^RESEND_API_KEY=/d' .env.production
              echo "RESEND_API_KEY=$RESEND_API_KEY" >> .env.production
              sed -i 's/^ENABLE_EMAIL=false/ENABLE_EMAIL=true/' .env.production
              sed -i '/^EMAIL_FROM=/d' .env.production
              echo "EMAIL_FROM=support@siyabusaerp.co.za" >> .env.production
            fi
            # Fix URLs (ensure correct domain)
            sed -i 's|FRONTEND_URL=https://platform.siyabusaerp.co.za|FRONTEND_URL=https://siyabusaerp.co.za|g' .env.production
            sed -i 's|APP_URL=https://platform.siyabusaerp.co.za|APP_URL=https://siyabusaerp.co.za|g' .env.production
            sed -i 's|API_URL=https://platform.siyabusaerp.co.za/api|API_URL=https://siyabusaerp.co.za/api|g' .env.production
            docker compose -f docker-compose.digitalocean.yml up -d --build
            docker image prune -f
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
