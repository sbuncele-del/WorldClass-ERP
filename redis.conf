# Redis Configuration for WorldClass ERP

# Network
bind 0.0.0.0
protected-mode no
port 6379

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
appendonly yes
appendfilename "appendonly.aof"
save 900 1
save 300 10
save 60 10000

# Security (Enable in production)
# requirepass yourpassword

# Clients
maxclients 10000
