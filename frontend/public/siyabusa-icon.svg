<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1F3E"/>
      <stop offset="100%" style="stop-color:#0F2D5E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="100%" style="stop-color:#00A884"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00D4AA;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Subtle glow behind the mark -->
  <circle cx="256" cy="240" r="160" fill="url(#glow)"/>
  <!-- Three ascending bars — growth, momentum, success -->
  <rect x="112" y="296" width="72" height="120" rx="12" fill="url(#accent)" opacity="0.6"/>
  <rect x="220" y="216" width="72" height="200" rx="12" fill="url(#accent)" opacity="0.8"/>
  <rect x="328" y="136" width="72" height="280" rx="12" fill="url(#accent)"/>
  <!-- Upward arrow — aspiration, progress -->
  <path d="M364 96 L394 136 L378 136 L378 136 Z" fill="none"/>
  <polyline points="364,96 364,156" stroke="#00D4AA" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.5"/>
  <polyline points="348,118 364,96 380,118" stroke="#00D4AA" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
</svg>
