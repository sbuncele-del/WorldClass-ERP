<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Try Aetheros ERP - Free Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      padding: 40px 20px;
    }

    .header h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .header p {
      font-size: 1.3rem;
      opacity: 0.95;
    }

    .demo-card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      margin-top: 30px;
    }

    .credentials {
      background: #f7fafc;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 30px;
    }

    .credentials h2 {
      color: #2d3748;
      margin-bottom: 15px;
      font-size: 1.5rem;
    }

    .credential-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: white;
      border-radius: 8px;
      margin-bottom: 10px;
      font-family: 'Courier New', monospace;
    }

    .credential-label {
      font-weight: 600;
      color: #4a5568;
    }

    .credential-value {
      color: #667eea;
      font-size: 1.1rem;
    }

    .cta-button {
      display: block;
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.3rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-bottom: 20px;
    }

    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .cta-button:active {
      transform: translateY(0);
    }

    .cta-button.loading {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .feature {
      background: #f7fafc;
      padding: 20px;
      border-radius: 12px;
      border-left: 4px solid #667eea;
    }

    .feature-icon {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .feature h3 {
      color: #2d3748;
      margin-bottom: 8px;
      font-size: 1.1rem;
    }

    .feature p {
      color: #718096;
      font-size: 0.95rem;
    }

    .reset-notice {
      background: #fff5f5;
      border: 2px solid #feb2b2;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      text-align: center;
    }

    .reset-notice h3 {
      color: #c53030;
      margin-bottom: 8px;
    }

    .reset-notice p {
      color: #742a2a;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      margin: 30px 0;
      padding: 20px;
      background: #edf2f7;
      border-radius: 12px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #667eea;
    }

    .stat-label {
      color: #718096;
      font-size: 0.9rem;
    }

    .error-message {
      background: #fff5f5;
      border: 2px solid #fc8181;
      color: #c53030;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 2rem;
      }
      
      .header p {
        font-size: 1.1rem;
      }

      .demo-card {
        padding: 25px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚀 Aetheros ERP</h1>
      <p>Experience the future of business management</p>
    </div>

    <div class="demo-card">
      <div class="credentials">
        <h2>🔑 Demo Credentials</h2>
        <div class="credential-item">
          <span class="credential-label">Email:</span>
          <span class="credential-value">demo@aetheros.co.za</span>
        </div>
        <div class="credential-item">
          <span class="credential-label">Password:</span>
          <span class="credential-value">Demo123!</span>
        </div>
      </div>

      <div id="errorMessage" class="error-message"></div>

      <button id="demoButton" class="cta-button" onclick="startDemo()">
        🎯 Launch Demo Now (No Signup Required)
      </button>

      <div class="stats" id="demoStats">
        <div class="stat">
          <div class="stat-value" id="statUsers">-</div>
          <div class="stat-label">Users</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="statCustomers">-</div>
          <div class="stat-label">Customers</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="statProducts">-</div>
          <div class="stat-label">Products</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="statInvoices">-</div>
          <div class="stat-label">Invoices</div>
        </div>
      </div>

      <div class="features" id="featuresList">
        <!-- Features will be loaded dynamically -->
      </div>

      <div class="reset-notice">
        <h3>⏰ Demo Resets Daily</h3>
        <p>Demo data resets every day at 2:00 AM SAST. Your session lasts 8 hours.</p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'http://localhost:3000/api'; // Change in production

    // Load demo info on page load
    async function loadDemoInfo() {
      try {
        const response = await fetch(`${API_BASE_URL}/demo/info`);
        const data = await response.json();

        if (data.success) {
          // Update stats
          document.getElementById('statUsers').textContent = data.demo.stats.users;
          document.getElementById('statCustomers').textContent = data.demo.stats.customers;
          document.getElementById('statProducts').textContent = data.demo.stats.products;
          document.getElementById('statInvoices').textContent = data.demo.stats.invoices;

          // Render features
          const featuresList = document.getElementById('featuresList');
          featuresList.innerHTML = data.demo.features.map(feature => `
            <div class="feature">
              <div class="feature-icon">${feature.icon}</div>
              <h3>${feature.title}</h3>
              <p>${feature.description}</p>
            </div>
          `).join('');
        }
      } catch (error) {
        console.error('Failed to load demo info:', error);
      }
    }

    // Start demo
    async function startDemo() {
      const button = document.getElementById('demoButton');
      const errorMessage = document.getElementById('errorMessage');
      
      // Show loading state
      button.disabled = true;
      button.classList.add('loading');
      button.innerHTML = '<span class="loader"></span> Launching Demo...';
      errorMessage.style.display = 'none';

      try {
        const response = await fetch(`${API_BASE_URL}/demo/access`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          }
        });

        const data = await response.json();

        if (data.success) {
          // Store token in localStorage
          localStorage.setItem('authToken', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          localStorage.setItem('tenant', JSON.stringify(data.tenant));

          // Redirect to dashboard
          // In production, this would be your frontend dashboard URL
          window.location.href = data.dashboardUrl || '/dashboard';
        } else {
          throw new Error(data.message || 'Failed to start demo');
        }

      } catch (error) {
        console.error('Demo start error:', error);
        errorMessage.textContent = '❌ ' + error.message;
        errorMessage.style.display = 'block';
        
        // Reset button
        button.disabled = false;
        button.classList.remove('loading');
        button.innerHTML = '🎯 Launch Demo Now (No Signup Required)';
      }
    }

    // Load demo info when page loads
    loadDemoInfo();
  </script>
</body>
</html>
