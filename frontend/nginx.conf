server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
    gzip_comp_level 6;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets (hashed filenames — safe to cache forever)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html — always serve fresh on deploy
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # API proxy - route to backend container
    location /api {
        proxy_pass http://erp-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ─── Per-page SEO title injection ────────────────────────────────────────
    # React SPA: every route is served as index.html, so Google's first crawl
    # pass sees the same default title for all pages.  Nginx sub_filter rewrites
    # the <title> tag BEFORE the response is sent (before gzip), giving each
    # marketing page a unique, crawlable title without needing SSR.
    # ─────────────────────────────────────────────────────────────────────────
    sub_filter_once on;

    location = /pricing {
        sub_filter "<title>SiyaBusa ERP — Your Business is Complex. Managing It Shouldn't Be.</title>" "<title>Pricing — SiyaBusa ERP | All Modules from R1,499/mo | South Africa</title>";
        sub_filter "<link rel=canonical href=https://siyabusaerp.co.za />" "<link rel=canonical href=https://siyabusaerp.co.za/pricing />";
        try_files $uri $uri/ /index.html;
    }

    location = /features {
        sub_filter "<title>SiyaBusa ERP — Your Business is Complex. Managing It Shouldn't Be.</title>" "<title>Features — SiyaBusa ERP | 17 Integrated ERP Modules for SA Businesses</title>";
        sub_filter "<link rel=canonical href=https://siyabusaerp.co.za />" "<link rel=canonical href=https://siyabusaerp.co.za/features />";
        try_files $uri $uri/ /index.html;
    }

    location = /about {
