version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: worldclass_erp_db
    environment:
      POSTGRES_USER: worldclass
      POSTGRES_PASSWORD: worldclass123
      POSTGRES_DB: worldclass_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - erp_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: worldclass_erp_backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://worldclass:worldclass123@postgres:5432/worldclass_erp
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
    networks:
      - erp_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: worldclass_erp_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - erp_network

volumes:
  postgres_data:

networks:
  erp_network:
    driver: bridge
