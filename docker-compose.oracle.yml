# ============================================================
# WorldClass ERP - Oracle Cloud Docker Deployment
# ============================================================
# Cost: $0/month (Oracle Always Free Tier)
# Resources: 4 ARM CPUs, 24GB RAM, 200GB Storage
# ============================================================

version: '3.8'

services:
  # ========================================
  # PostgreSQL Database
  # ========================================
  postgres:
    image: postgres:15-alpine
    container_name: worldclass-db
    restart: always
    environment:
      POSTGRES_DB: worldclass_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-worldclass_secure_2024}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d worldclass_erp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - worldclass-network

  # ========================================
  # Redis Cache
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: worldclass-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - worldclass-network

  # ========================================
  # Backend API (Node.js/Express)
  # ========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: worldclass-erp-backend:latest
    container_name: worldclass-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      
      # Database
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-worldclass_secure_2024}@postgres:5432/worldclass_erp
      
      # Redis
      REDIS_URL: redis://redis:6379
      
      # JWT (auto-generated if not set)
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      
      # Frontend URL
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      
      # Default tenant
      DEFAULT_TENANT_ID: 1
    ports:
      - "3000:3000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - worldclass-network

  # ========================================
  # Frontend (React + Nginx)
  # ========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    image: worldclass-erp-frontend:latest
    container_name: worldclass-frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - worldclass-network

  # ========================================
  # Tesseract OCR Service (Optional)
  # Replaces AWS Textract for document scanning
  # ========================================
  ocr:
    image: tesseractshadow/tesseract4re
    container_name: worldclass-ocr
    restart: unless-stopped
    volumes:
      - ocr_data:/tmp/ocr
    networks:
      - worldclass-network
    profiles:
      - ocr  # Only starts with: docker compose --profile ocr up

# ========================================
# Networks
# ========================================
networks:
  worldclass-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ========================================
# Volumes (Persistent Storage)
# ========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local
  ocr_data:
    driver: local
