<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 9pt;
      background-color: #0d2137;
      color: #ffffff;
      width: 100%;
      padding: 0 40px;
    }
    table { width: 100%; border-collapse: collapse; }
    td { vertical-align: middle; padding: 5px 0; }
    .right { text-align: right; color: #a8c8e8; font-size: 8pt; }
  </style>
</head>
<body>
  <table><tr>
    <td><strong>Bontle Mokoene</strong> &nbsp;&bull;&nbsp; 079 840 5205</td>
    <td class="right">Page <span class="page"></span> of <span class="topage"></span></td>
  </tr></table>
</body>
</html>
