<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 8.5pt;
      background-color: #0d2137;
      color: #a8c8e8;
      width: 100%;
      padding: 0 40px;
    }
    table { width: 100%; border-collapse: collapse; }
    td { vertical-align: middle; padding: 5px 0; }
    .left { color: #a8c8e8; font-size: 8pt; letter-spacing: 1px; text-transform: uppercase; }
    .right { text-align: right; color: #ffffff; font-weight: bold; font-size: 9.5pt; }
    .page, .topage { display: none; }
  </style>
  <script>
    window.onload = function() {
      var page = parseInt(document.getElementsByClassName('page')[0].innerHTML);
      if (page === 1) document.body.style.visibility = 'hidden';
    }
  </script>
</head>
<body>
  <table><tr>
    <td class="left">Professional Tax Services &bull; Confidential</td>
    <td class="right">Tax Compliance Services Proposal</td>
  </tr></table>
  <span class="page"></span><span class="topage"></span>
</body>
</html>
